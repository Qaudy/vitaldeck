services:
  vitaldeck:
    image: ghcr.io/qaudy/vitaldeck:latest
    # to build locally from source instead: comment out image above and uncomment:
    # build: .
    container_name: vitaldeck
    restart: unless-stopped
    # host networking: /proc/net/dev follows the reader's namespace, so this
    # is the only way to see the Pi's real interfaces (also exposes :8800)
    network_mode: host
    environment:
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
      HOST_ROOT: /host/root
      # where the dashboard stores links/config/categories + the admin account
      DATA_DIR: /app/data
    # SMART disk-health panel needs to issue raw SMART commands to the drives.
    # This is the one privilege the dashboard asks for beyond read-only mounts —
    # far narrower than `privileged: true`. Don't want it? Delete these two lines
    # and the /dev mount below; the panel simply hides. Some HBAs / USB-SATA
    # bridges additionally need SYS_ADMIN — add it here only if your drives don't
    # show up.
    cap_add:
      - SYS_RAWIO
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # host device nodes (read-only) so smartctl can read drive SMART data
      - /dev:/dev:ro
      # persistent state: settings edited in the dashboard + your login survive
      # `docker compose up -d --force-recreate` and image updates. No file prep
      # needed — first run seeds defaults into the volume automatically.
      - vitaldeck-data:/app/data


  cloudflared:
    # opt-in: off by default. Enable with `docker compose --profile tunnel up -d`.
    # See the Security section of the README before exposing the dashboard.
    profiles: ["tunnel"]
    container_name: vitaldeck-tunnel
    # pinned (not :latest) for reproducible builds — bump to a current tag from
    # https://hub.docker.com/r/cloudflare/cloudflared/tags
    image: cloudflare/cloudflared:2024.10.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - tunnel

networks:
  tunnel:
    driver: bridge

volumes:
  vitaldeck-data:

